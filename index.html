<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoThis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Header">
        <h1 id="title">To Do This</h1>
        <h3>A list of tasks I must complete</h3>
    </div>
    <div id="Item-List" class="Card-Holder">
        <div id="Task-Card" class="card">
            <span id="Task-Title" class="cardItem">Item #1 title</span>
            <p id="Task-Description" class="cardItem">Item Description</p>
            <p id="Task-DueDate" class="cardItem">Due Date</p>
            <p id="Task-Priority" class="cardItem">Priority</p>
            <p id="Task-Project" class="cardItem">Project</p>
            <p id="Task-Completion" class="cardItem">Completed? </p>
        </div>
        <div id="Task-Card2" class="card">
                <span id="Task-Title2" class="cardItem">Item #1 title</span>
                <p id="Task-Description2" class="cardItem">Item Description</p>
                <p id="Task-DueDate2" class="cardItem">Due Date</p>
                <p id="Task-Priority2" class="cardItem">Priority</p>
                <p id="Task-Project2" class="cardItem">Project</p>
                <p id="Task-Completion2" class="cardItem">Completed? </p>
            </div>
    </div>
    
</body>
<script src="main.js"></script>
</html>
