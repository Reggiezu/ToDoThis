<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoThis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Header">
        <h1 id="title">To Do This</h1>
        <h3>A list of tasks I must complete</h3>
    </div>
    <button id="add-task-btn">Add New Task</button>
    <div id="Task-Card" class="card hidden" >
            <form id="new-task-form">
                <label for="title"><strong>Title</strong></label>
                <input type="text" id="Task-Title" class="cardItem" size="40" required>
                <label for="Task-Description"><strong>Item Description</strong></label>
                <input type="text" id="Task-Description" class="cardItem" size="40" required>
                <label for="Task-DueDate"><strong>Due Date</strong></label>
                <input type="date" id="Task-DueDate" class="cardItem" size="40" required>
                <label for="Task-Priority"><strong>Priority</strong></label>
                <input type="number" id="Task-Priority" class="cardItem" size="50" min="1" max="5" required>
                <label for="Task-Project"><strong>Project</strong></label>
                <select id="Task-Project" class="cardItem" required>
                </select>
                <div id="Task-Completion-Container">
                <label for="Task-Completion"><strong> Task Completed?</strong></label>
                <div id="Task-Completed-Checkbox">
                <label for="coding">Complete</label>
                <input type="radio" id="Task-Completed" name="completion-status" value="true">
                </div>
                <div id="Task-Incompleted-Checkbox">
                <label for="coding">Incomplete</label>
                <input type="radio" id="Task-Incompleted"  name="completion-status" value="false" checked>
                </div>
                </div>
                <button id="submit-task" type="submit">Add Task</button>
                <button type="button" id="close-task-form">Close</button>
            </form>
        </div>
    <div id="Item-List" class="Card-Holder">
    </div>
    
</body>
<script src="main.js"></script>
</html>
